name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # Install typst so the compile-check tests can run end-to-end.
      - name: Install typst
        uses: typst-community/setup-typst@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch pinned corpus
        run: pip install requests && python scripts/corpus_harvest.py --pinned

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  corpus:
    name: corpus pass-rate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build -p byetex --release

      - name: Harvest corpus
        run: |
          ./target/release/byetex corpus harvest \
            --source context/latex-context.md \
            --out tests/corpus/

      - name: Run corpus
        run: ./target/release/byetex corpus run --dir tests/corpus/

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: corpus-report
          path: tests/corpus/report.json

      - name: Render README warning summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python3 scripts/render_corpus_summary.py \
            --report tests/corpus/report.json \
            --update README.md

      - name: Commit README update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh corpus warning table [skip ci]"
          file_pattern: README.md

  fidelity:
    # Render-fidelity regression gate (Layer 1). Heavy — it renders the pinned
    # corpus and downloads arXiv truth PDFs — so it is MANUAL: run it from the
    # Actions tab before a release, or locally via ./scripts/fidelity_gate.sh.
    # Compile-rate is gated by the always-on `test` job; this gates render
    # quality (the DRIVER) against scripts/fidelity_baseline.json.
    name: fidelity gate (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: typst-community/setup-typst@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install deps + fetch pinned corpus
        run: |
          pip install requests numpy pillow
          python scripts/corpus_harvest.py --pinned

      - name: Fidelity gate (pinned papers)
        run: ./scripts/fidelity_gate.sh
