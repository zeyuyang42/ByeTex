name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Cross-compile for aarch64-unknown-linux-musl
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build -p byetex-cli --release --target ${{ matrix.target }} --features mcp

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          NAME="byetex-${GITHUB_REF_NAME}-${{ matrix.target }}"
          STAGE="dist/${NAME}"
          mkdir -p "${STAGE}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/byetex.exe" "${STAGE}/"
          else
            cp "target/${{ matrix.target }}/release/byetex" "${STAGE}/"
          fi
          cp -r skills "${STAGE}/"
          cp README.md "${STAGE}/" 2>/dev/null || true
          cp LICENSE-MIT "${STAGE}/" 2>/dev/null || true
          cp LICENSE-APACHE "${STAGE}/" 2>/dev/null || true
          cd dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "${NAME}.zip" "${NAME}"
          else
            tar czf "${NAME}.tar.gz" "${NAME}"
          fi
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: byetex-${{ matrix.target }}
          path: dist/byetex-*.{tar.gz,zip}
          if-no-files-found: ignore

  release:
    name: publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact dirs
        run: |
          find dist -name 'byetex-*.tar.gz' -exec cp {} dist/ \;
          find dist -name 'byetex-*.zip' -exec cp {} dist/ \;
          ls -la dist/

      - name: Generate checksums
        run: cd dist && sha256sum byetex-*.tar.gz byetex-*.zip > SHA256SUMS 2>/dev/null || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/byetex-*.tar.gz
            dist/byetex-*.zip
            dist/SHA256SUMS
          generate_release_notes: true
